# Optional Neo4j for the graph features. The default graph engine (npm run
# graph) is in-memory and needs none of this; spin this up only if you want to
# load the vault into Neo4j:
#
#   docker compose up -d
#   npm run graph -- cypher          # writes analytics/graph.cypher
#   docker compose exec -T neo4j cypher-shell -u neo4j -p grandma2 < analytics/graph.cypher
#   open http://localhost:7474
services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/grandma2
    volumes:
      - neo4j-data:/data
volumes:
  neo4j-data:
