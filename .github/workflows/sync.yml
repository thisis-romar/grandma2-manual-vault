name: Sync Branches

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── github-browse: convert [[wikilinks]] → relative markdown links ──────────
  github-browse:
    name: Update github-browse branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install extractor deps
        run: |
          cd scripts
          npm ci

      - name: Convert wikilinks
        run: node scripts/convert-links.js .

      - name: Swap in the github-browse README
        # convert-links.js skips README.md, so replace it with the branch-specific
        # version (relative links, "auto-generated mirror" context) for this surface.
        run: cp .github/readme/README.github-browse.md README.md

      - name: Push to github-browse
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Orphan branch or force-push converted content
          git checkout --orphan github-browse-tmp
          git add -A
          git commit -m "ci: sync github-browse from main [$(git rev-parse --short HEAD main)]"

          git push origin HEAD:github-browse --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── gh-pages: build Quartz static site ─────────────────────────────────────
  gh-pages:
    name: Build and deploy Quartz site
    runs-on: ubuntu-latest
    needs: github-browse
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clone Quartz
        run: |
          # Pin to the latest v4 release — v5 dropped the clone-and-build model
          # (quartz.config.ts and .quartz/ are now generated by `npx quartz create`).
          git clone --depth 1 --branch v4.5.2 https://github.com/jackyzha0/quartz.git _quartz

      - name: Install Quartz deps
        run: |
          cd _quartz
          npm ci

      - name: Copy vault into Quartz content
        run: |
          rm -rf _quartz/content
          mkdir -p _quartz/content
          # Copy everything except scripts, .github, .obsidian internals
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='scripts' \
            --exclude='_quartz' \
            --exclude='.obsidian' \
            . _quartz/content/

      - name: Generate Quartz landing page
        # The vault has no root index.md; provide the website's home page with
        # site-specific context (search + graph) so gh-pages doesn't land on a
        # bare file listing. Quartz (Obsidian-flavored) resolves [[wikilinks]].
        run: |
          cat > _quartz/content/index.md <<'EOF'
          ---
          title: grandMA2 Manual Vault
          ---

          The complete [grandMA2 User Manual](https://help.malighting.com/grandMA2/en/help/) as an
          interlinked knowledge vault — with full-text search (press **/**) and an interactive graph.

          ## Start here

          - [[000 Map of Content]] — top-level index
          - [[000 Keyword Index]] — all CLI keywords
          - [[000 Key Index]] — console keys and buttons

          Source and other ways to read on
          [GitHub](https://github.com/thisis-romar/grandma2-manual-vault).
          EOF

      - name: Configure Quartz (title + base URL)
        run: |
          cd _quartz
          # Patch quartz.config.ts with vault identity
          sed -i \
            "s/pageTitle: .*/pageTitle: \"grandMA2 Manual Vault\",/" \
            quartz.config.ts || true

      - name: Build Quartz
        run: |
          cd _quartz
          npx quartz build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_quartz/public
          publish_branch: gh-pages
          force_orphan: true
