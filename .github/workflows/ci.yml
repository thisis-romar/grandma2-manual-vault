name: CI

# Quality gate: lint + format + unit tests + vault conformance audit.
# Runs on every push to main and on pull requests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 # don't install git hooks in CI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dev tooling (root)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Install script deps
        working-directory: scripts
        run: npm ci

      - name: Unit tests
        working-directory: scripts
        run: node --test

      - name: Vault conformance audit
        working-directory: scripts
        run: node audit.js ..
